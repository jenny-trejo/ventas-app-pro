<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas Pro Firebase</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4e73df, #1cc88a);
  min-height: 100vh;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  color: white;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  margin-bottom: 20px;
}

.form input {
  width: 30%;
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.form button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #4e73df;
  color: white;
  cursor: pointer;
}

.logout {
  background: #e74a3b !important;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #4e73df;
  color: white;
}

th, td {
  padding: 12px;
  text-align: center;
}

tr:nth-child(even) {
  background: #f8f9fc;
}

.actions button {
  padding: 6px 10px;
  margin: 2px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.edit {
  background: #f6c23e;
  color: white;
}

.delete {
  background: #e74a3b;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Sistema de Ventas Firebase</h1>

<div class="card form">
  <input type="text" id="producto" placeholder="Producto">
  <input type="number" id="precio" placeholder="Precio">
  <input type="number" id="cantidad" placeholder="Cantidad">
  
  <br>
  <button onclick="agregarVenta()">Agregar</button>
  <button class="logout" onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Precio</th>
        <th>Cantidad</th>
        <th>Total</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaVentas"></tbody>
  </table>
</div>

</div>

<script>
// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAJyTl_JM46DEvKsNBbhXY-g-401DXDKX8",
  authDomain: "ventas-app-pro-d5bc9.firebaseapp.com",
  projectId: "ventas-app-pro-d5bc9",
  storageBucket: "ventas-app-pro-d5bc9.firebasestorage.app",
  messagingSenderId: "340730905177",
  appId: "1:340730905177:web:3dcad510606332290ea748"
};

// Inicializar Firebase
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📥 CARGAR DATOS
window.onload = async () => {
  const snapshot = await db.collection("ventas").get();
  snapshot.forEach(doc => {
    pintarVenta(doc.id, doc.data());
  });
};

// ➕ AGREGAR
async function agregarVenta() {
  const producto = document.getElementById("producto").value;
  const precio = parseFloat(document.getElementById("precio").value);
  const cantidad = parseInt(document.getElementById("cantidad").value);

  if (!producto || !precio || !cantidad) {
    alert("Completa los campos");
    return;
  }

  const total = precio * cantidad;

  const docRef = await db.collection("ventas").add({
    producto,
    precio,
    cantidad,
    total
  });

  pintarVenta(docRef.id, { producto, precio, cantidad, total });

  limpiar();
}

// 🖥️ MOSTRAR
function pintarVenta(id, data) {
  const tabla = document.getElementById("tablaVentas");

  const fila = document.createElement("tr");

  fila.innerHTML = `
    <td>${data.producto}</td>
    <td>$${data.precio}</td>
    <td>${data.cantidad}</td>
    <td>$${data.total}</td>
    <td class="actions">
      <button class="edit" onclick="editarVenta('${id}', this)">Editar</button>
      <button class="delete" onclick="eliminarVenta('${id}', this)">Eliminar</button>
    </td>
  `;

  tabla.appendChild(fila);
}

// ❌ ELIMINAR
async function eliminarVenta(id, btn) {
  if (confirm("¿Eliminar producto?")) {
    await db.collection("ventas").doc(id).delete();
    btn.closest("tr").remove();
  }
}

// ✏️ EDITAR
async function editarVenta(id, btn) {
  const fila = btn.closest("tr");

  document.getElementById("producto").value = fila.children[0].innerText;
  document.getElementById("precio").value = fila.children[1].innerText.replace("$","");
  document.getElementById("cantidad").value = fila.children[2].innerText;

  await db.collection("ventas").doc(id).delete();
  fila.remove();
}

// 🧹 LIMPIAR
function limpiar() {
  document.getElementById("producto").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("cantidad").value = "";
}

// 🔐 CERRAR SESIÓN
function cerrarSesion() {
  alert("Sesión cerrada");
  window.location.href = "index.html";
}
</script>

</body>
</html>
