<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD Ventas</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #333;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
}

.add-btn { background: #28a745; color: white; }
.edit-btn { background: #ffc107; }
.delete-btn { background: #dc3545; color: white; }
.logout-btn {
  background: #343a40;
  color: white;
  float: right;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

th {
  background: #667eea;
  color: white;
}

.total {
  text-align: right;
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  <h2>Sistema de Ventas</h2>

  <input type="text" id="producto" placeholder="Producto">
  <input type="number" id="precio" placeholder="Precio">
  <input type="number" id="cantidad" placeholder="Cantidad">
  <button class="add-btn" onclick="agregarProducto()">Agregar</button>

  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Precio</th>
        <th>Cantidad</th>
        <th>Total</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div class="total" id="totalGeneral">Total: $0</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem('productos')) || [];
let editIndex = -1;

function guardarLocal() {
  localStorage.setItem('productos', JSON.stringify(productos));
}

function renderizar() {
  const tabla = document.getElementById('tabla');
  tabla.innerHTML = '';
  let totalGeneral = 0;

  productos.forEach((p, i) => {
    const total = p.precio * p.cantidad;
    totalGeneral += total;

    tabla.innerHTML += `
      <tr>
        <td>${p.nombre}</td>
        <td>$${p.precio}</td>
        <td>${p.cantidad}</td>
        <td>$${total}</td>
        <td>
          <button class="edit-btn" onclick="editar(${i})">Editar</button>
          <button class="delete-btn" onclick="eliminar(${i})">Eliminar</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('totalGeneral').innerText = 'Total: $' + totalGeneral;
}

function agregarProducto() {
  const nombre = document.getElementById('producto').value;
  const precio = parseFloat(document.getElementById('precio').value);
  const cantidad = parseInt(document.getElementById('cantidad').value);

  if (!nombre || !precio || !cantidad) {
    alert('Completa todos los campos');
    return;
  }

  if (editIndex === -1) {
    productos.push({ nombre, precio, cantidad });
  } else {
    productos[editIndex] = { nombre, precio, cantidad };
    editIndex = -1;
  }

  limpiar();
  guardarLocal();
  renderizar();
}

function editar(index) {
  const p = productos[index];
  document.getElementById('producto').value = p.nombre;
  document.getElementById('precio').value = p.precio;
  document.getElementById('cantidad').value = p.cantidad;
  editIndex = index;
}

function eliminar(index) {
  if (confirm('¿Eliminar producto?')) {
    productos.splice(index, 1);
    guardarLocal();
    renderizar();
  }
}

function limpiar() {
  document.getElementById('producto').value = '';
  document.getElementById('precio').value = '';
  document.getElementById('cantidad').value = '';
}

function logout() {
  alert('Sesión cerrada');
  window.location.reload();
}

renderizar();
</script>

</body>
</html>
